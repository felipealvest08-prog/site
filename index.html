<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pombo Correio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h1>📨 Pombo Correio</h1>
    <input id="nome" type="text" placeholder="Seu nome">
    <input id="usuario" type="text" placeholder="Usuário">
    <input id="foto" type="file">
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <!-- TOPO -->
  <header>
    <div class="logo">📨 Pombo Correio</div>
    <button onclick="toggleTema()">🌙/☀️</button>
  </header>

  <div class="container">

    <!-- FEED CENTRAL -->
    <main>
      <h2>Stories</h2>
      <div id="stories" class="stories"></div>

      <h2>Feed</h2>
      <button onclick="atualizarFeed()">Atualizar</button>
      <div id="feed"></div>
    </main>

    <!-- CHAT DIREITA -->
    <aside class="chat">
      <h3>Conversas</h3>
      <div id="chatBox"></div>
      <input id="msg" placeholder="Digite..." />
      <button onclick="enviarMsg()">Enviar</button>
    </aside>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
