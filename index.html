<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Rede Anônima</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Cadastro -->
<div id="cadastro">
  <h1>Rede Anônima</h1>
  <p>Sem seguidores. Sem fama.</p>

  <input id="nome" type="text" placeholder="Nome completo">
  <input type="email" placeholder="E-mail">
  <input type="date">
  <input id="usuario" type="text" placeholder="Usuário">
  <input type="file">

  <button onclick="entrar()">Entrar</button>
</div>

<!-- Painel -->
<div id="painel" class="hidden">

  <div class="topo">
    <h2>Feed</h2>
    <button onclick="toggleTema()">🌙/☀️</button>
  </div>

  <!-- Stories -->
  <div class="stories" id="stories"></div>

  <!-- Botão atualizar -->
  <button onclick="atualizarFeed()">🔄 Atualizar Feed</button>

  <!-- Feed -->
  <div id="feed"></div>

</div>

<script src="script.js"></script>
</body>
</html>
