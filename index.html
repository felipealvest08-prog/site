<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pombo Correio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="login" class="tela">
  <div class="box">
    <h1>📨 Pombo Correio</h1>
    <input id="nome" placeholder="Seu nome">
    <input id="foto" type="file">
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header>
  <h1>📨 Pombo Correio</h1>
  <button onclick="abrirPerfil()">👤</button>
</header>

<div class="layout">

<!-- FEED -->
<main>
  <h3>Stories</h3>
  <div id="stories" class="stories"></div>

  <h3>Feed</h3>
  <div id="feed"></div>
</main>

<!-- CHAT -->
<aside class="chat">
  <h3>Chat</h3>
  <div id="chatBox"></div>
  <div class="chatInput">
    <input id="msg" placeholder="Digite...">
    <button onclick="enviarMsg()">Enviar</button>
  </div>
</aside>

</div>
</div>

<!-- PERFIL -->
<div id="perfil" class="overlay hidden">
  <div class="box">
    <h2>Seu Perfil</h2>
    <img id="perfilFoto">
    <p id="perfilNome"></p>
    <p id="visitas"></p>
    <button onclick="fecharPerfil()">Fechar</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
