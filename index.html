<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pombo Correio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="login" class="tela">
  <div class="box">
    <h1>📨 Pombo Correio</h1>
    <input id="nome" placeholder="Apelido (anônimo)">
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header>
  <h1>📨 Pombo Correio</h1>
</header>

<div class="layout">

<!-- ESQUERDA (CONVERSAS) -->
<aside class="conversas">
  <h3>Conversas</h3>
  <div id="listaConversas"></div>
</aside>

<!-- CENTRO (CHAT) -->
<main class="chatArea">
  <div id="chatBox"></div>

  <div class="chatInput">
    <input id="msg" placeholder="Mensagem...">
    <button onclick="enviarMsg()">Enviar</button>
  </div>
</main>

<!-- DIREITA (FEED + STORIES) -->
<aside class="feedArea">
  <h3>Stories</h3>
  <div id="stories" class="stories"></div>

  <h3>Feed</h3>
  <div id="feed"></div>
</aside>

</div>
</div>

<!-- STORY VIEW -->
<div id="storyView" class="overlay hidden">
  <img id="storyImg">
  <button onclick="fecharStory()">Fechar</button>
</div>

<script src="script.js"></script>
</body>
</html>
