<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pombo Correio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- COOKIES -->
<div id="cookies" class="overlay">
  <div class="box">
    <h2>🍪 Cookies</h2>
    <p>Usamos cookies para melhorar sua experiência.</p>
    <button onclick="aceitarCookies()">Aceitar</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="hidden">
  <div class="box">
    <h1>📨 Pombo Correio</h1>
    <input id="nome" placeholder="Nome">
    <input id="usuario" placeholder="Usuário">
    <input id="foto" type="file">
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- TERMOS -->
<div id="termos" class="overlay hidden">
  <div class="box">
    <h2>Regras</h2>
    <p>✔ Seja respeitoso<br>✔ Nada ilegal<br>✔ Conteúdo livre</p>
    <button onclick="aceitarTermos()">Aceitar</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header>
  <h1>📨 Pombo Correio</h1>
</header>

<div class="layout">

<!-- ESQUERDA -->
<aside class="menu">
  <button onclick="abrirPerfil()">👤 Perfil</button>
</aside>

<!-- FEED -->
<main>
  <h3>Stories</h3>
  <div id="stories" class="stories"></div>

  <h3>Feed</h3>
  <div id="feed"></div>
</main>

<!-- CHAT -->
<aside class="chat">
  <h3>Conversas</h3>
  <div id="users"></div>
  <div id="chatBox"></div>
  <input id="msg">
  <button onclick="enviarMsg()">Enviar</button>
</aside>

</div>
</div>

<!-- PERFIL -->
<div id="perfil" class="overlay hidden">
  <div class="box">
    <h2>Perfil</h2>
    <img id="perfilFoto">
    <p id="perfilNome"></p>
    <p id="visitas"></p>
    <button onclick="fecharPerfil()">Fechar</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
